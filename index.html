<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Location on World Map</title>
    <style>
        #map { height: 700px; width: 100%; margin-top: 20px; }
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
    </style>
    <link rel="stylesheet" href="js/leaflet.css" />
</head>
<body>
    <h1>World Map</h1>
    <div id="map"></div>
    <script src="js/leaflet.js"></script>
    <script>

        var myLocation = "Home";
 
        const BIN_ID = '6a17509921f9ee59d292b72f';
        // const MASTER_KEY = '$2a$10$5sQLlb2I7jiTLrE3WUHZw.PbdFgyZJxK5VEfV9eMInJ8cpSe/95g6';
        const MASTER_KEY = process.env.JSONBIN_KEY;
        console.log("Is the key loaded?", MASTER_KEY ? "Yes, it is working!" : "No, it is empty!");

        window.onload = function() {
            fetchLocationsAndShowOnMap();
        };

        async function fetchLocationsAndShowOnMap() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    method: "GET",
                    headers: {
                        "X-Master-Key": MASTER_KEY
                    }
                });
                const data = await response.json();
                // Extract locations array from JSONBin structure
                const remoteLocations = (data.record && Array.isArray(data.record.locations)) ? data.record.locations : [];
                if (!remoteLocations.length) {
                    return;
                }

                // Show all locations if more than one, otherwise just the first
                const map = L.map('map').setView([remoteLocations[0].latitude, remoteLocations[0].longitude], 4);

                // Add OpenStreetMap tiles
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                let firstMarker = null;

                console.log(JSON.stringify(remoteLocations));

                // Count how many locations share each coordinate
                const coordCount = {};
                remoteLocations.forEach(loc => {
                    const key = loc.latitude + ',' + loc.longitude;
                    coordCount[key] = (coordCount[key] || 0) + 1;
                });

                // Track if we've already placed a marker for a coordinate
                const coordPlaced = {};

                remoteLocations.forEach((loc, idx) => {
                    const key = loc.latitude + ',' + loc.longitude;
                    if (coordPlaced[key]) return; // Only place one marker per coordinate
                    coordPlaced[key] = true;
                    // Always use the default marker icon
                    const marker = L.marker([loc.latitude, loc.longitude]);
                    const playerCount = coordCount[key];
                    const playerText = playerCount === 1 ? '1 player' : `${playerCount} players`;
                    marker.addTo(map)
                        .bindPopup(`<b>${loc.city}</b><br>${playerText}`);
                    if (firstMarker === null) firstMarker = marker;
                });
                // Open the first marker's popup
                if (firstMarker) firstMarker.openPopup();
            } catch (err) {
                alert('Failed to fetch locations from API.');
                console.error(err);
            }
        }

        
    </script>
</body>
</html>
