
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Location on World Map</title>
    <style>
        #map { height: 700px; width: 100%; margin-top: 20px; }
        body { font-family: Arial, sans-serif; }
        h1 { text-align: center; }
    </style>
    <link rel="stylesheet" href="js/leaflet.css" />
</head>
<body>
    <h1>My Location on the World Map</h1>
    <div id="map"></div>
    <script src="js/leaflet.js"></script>
    <script>

        var myLocation = "Home";
 
        // https://location-rkkj.onrender.com/json/info

        window.onload = function() {
            fetchLocationsAndShowOnMap();
        };

        async function fetchLocationsAndShowOnMap() {
            try {
                const response = await fetch('https://location-rkkj.onrender.com/json/info');
                const data = await response.json();
                // If the API returns an array, use it directly. If it returns { info: [...] }, use data.info
                const remoteLocations = Array.isArray(data) ? data : (data.info || []);
                if (!remoteLocations.length) {
                    return;
                }

                // Show all locations if more than one, otherwise just the first
                const map = L.map('map').setView([remoteLocations[0].latitude, remoteLocations[0].longitude], 4);

                // Add OpenStreetMap tiles
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                let firstMarker = null;

                console.log(JSON.stringify(remoteLocations));
                remoteLocations.forEach((loc, idx) => {
                    const marker = L.marker([loc.latitude, loc.longitude])
                        .addTo(map)
                        .bindPopup(`<b>Your Location</b><br>${loc.city}, ${loc.country}`);
                    if (idx === 0) firstMarker = marker;
                });
                // Open the first marker's popup
                if (firstMarker) firstMarker.openPopup();
            } catch (err) {
                alert('Failed to fetch locations from API.');
                console.error(err);
            }
        }

        
    </script>
</body>
</html>
